name: "Validate repo-sync markers"
description: >
  Validates that all !repo-sync markers are properly paired and non-nested,
  that no symlinks target private/ directories or escape the repository root,
  and that text Git LFS payloads do not contain repo-sync markers.

inputs:
  paths:
    description: >
      Space-separated list of relative file paths or globs to validate.
      Defaults to all files in the repository.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.11"

    - name: Install repo-sync package
      shell: bash
      run: pip install "${{ github.action_path }}/../../"

    - name: Configure Git LFS
      shell: bash
      run: git lfs install --local

    - name: Run marker validation
      shell: bash
      env:
        PATHS_INPUT: ${{ inputs.paths }}
      run: |
        args=("--validate-only" "--validate-lfs-payloads" "${{ github.workspace }}")
        if [ -n "$PATHS_INPUT" ]; then
          for p in $PATHS_INPUT; do
            args+=("$p")
          done
        fi
        repo-sync-strip "${args[@]}"
