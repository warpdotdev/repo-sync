# Reusable workflow: sync creation.
# Triggered by a consuming repo on push to its default branch.
# All decision-making logic lives in Python (repo_sync.workflows.cli).

name: sync

on:
  workflow_call:
    inputs:
      public_repo:
        description: "Public repo (e.g. warpdotdev/warp-public)."
        required: true
        type: string
      private_repo:
        description: "Private repo (e.g. warpdotdev/warp-internal)."
        required: true
        type: string
      escalate_to:
        description: "GitHub team or user to escalate to on timeout."
        required: false
        type: string
        default: "@oncall-client-primary"
      slack_webhook_url:
        description: "Slack webhook URL for stripping error notifications."
        required: false
        type: string
        default: ""
      app_id:
        description: "GitHub App ID."
        required: true
        type: string
      repo_sync_ref:
        description: "Ref of the repo-sync repo to use (e.g. v1, main, david/integration)."
        required: false
        type: string
        default: "main"
    secrets:
      app_private_key:
        description: "GitHub App private key."
        required: true

concurrency:
  group: repo-sync-${{ github.repository == inputs.private_repo && 'private-to-public' || 'public-to-private' }}-${{ github.repository }}-${{ github.repository == inputs.private_repo && inputs.public_repo || inputs.private_repo }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO: ${{ inputs.public_repo }}
      PRIVATE_REPO: ${{ inputs.private_repo }}
    steps:
      - name: Generate installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, token: "${{ steps.token.outputs.token }}" }
      - uses: actions/checkout@v4
        with:
          repository: warpdotdev/repo-sync
          ref: ${{ inputs.repo_sync_ref }}
          path: .repo-sync
          token: ${{ steps.token.outputs.token }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .repo-sync
      - name: Set GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.token.outputs.token }}" >> "$GITHUB_ENV"
      - name: Configure git identity
        run: |
          git config --global user.name "repo-sync-bot"
          git config --global user.email "repo-sync-bot@users.noreply.github.com"

      # Derive peer_repo and source_is_private from the two repo names.
      - name: Derive sync context
        id: context
        run: |
          if [ "${{ github.repository }}" = "${PRIVATE_REPO}" ]; then
            echo "source_is_private=true" >> "$GITHUB_OUTPUT"
            echo "peer_repo=${PUBLIC_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "source_is_private=false" >> "$GITHUB_OUTPUT"
            echo "peer_repo=${PRIVATE_REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect direction
        id: direction
        run: |
          PRIVATE_FLAG=""
          [ "${{ steps.context.outputs.source_is_private }}" = "true" ] && PRIVATE_FLAG="--source-is-private"
          python -m repo_sync.workflows.cli detect-direction $PRIVATE_FLAG

      # No early-exit loop check here.  enumerate_unsynced_commits already
      # filters out sync-originated commits per-commit.  An early exit on
      # the trigger SHA would incorrectly skip unsynced commits when a
      # sync-originated commit replaces a normal commit in the concurrency
      # group's pending slot.

      - name: Read watermark
        id: watermark
        run: |
          python -m repo_sync.workflows.cli read-watermark \
            --peer-repo "${{ steps.context.outputs.peer_repo }}" \
            --direction "${{ steps.direction.outputs.direction }}"

      - name: List unsynced commits
        id: unsynced
        run: |
          python -m repo_sync.workflows.cli list-unsynced \
            --repo-dir . --gh-repo "${{ github.repository }}" \
            --direction "${{ steps.direction.outputs.direction }}" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            --watermark-sha "${{ steps.watermark.outputs.last_synced_sha }}"

      - name: Checkout peer repo
        if: steps.unsynced.outputs.count != '0'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.context.outputs.peer_repo }}
          ref: ${{ github.event.repository.default_branch }}
          path: peer
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Find existing stack top
        if: steps.unsynced.outputs.count != '0'
        id: stack_top
        run: |
          python -m repo_sync.workflows.cli find-stack-top \
            --peer-repo "${{ steps.context.outputs.peer_repo }}" \
            --direction "${{ steps.direction.outputs.direction }}"

      # Per-commit sync PR creation.  The loop and git/gh side effects remain
      # in shell; all decision logic (descriptions, reviewer, idempotency) is
      # delegated to Python CLI subcommands.
      - name: Create sync PRs
        if: steps.unsynced.outputs.count != '0'
        env:
          ESCALATE_TO: ${{ inputs.escalate_to }}
          SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
          SOURCE_REPO: ${{ github.repository }}
          STACK_TOP: ${{ steps.stack_top.outputs.stack_top }}
        run: |
          set -euo pipefail
          DIRECTION="${{ steps.direction.outputs.direction }}"
          BRANCH_PREFIX="${{ steps.direction.outputs.branch_prefix }}"
          PEER_REPO="${{ steps.context.outputs.peer_repo }}"
          SOURCE_IS_PRIVATE="${{ steps.context.outputs.source_is_private }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          STACK_BASE_BRANCH="${STACK_TOP:-${DEFAULT_BRANCH}}"
          IS_STACK_BOTTOM="true"
          [ -n "${STACK_TOP:-}" ] && IS_STACK_BOTTOM="false"

          while IFS= read -r SOURCE_SHA; do
            [ -z "$SOURCE_SHA" ] && continue
            SHORT_SHA="${SOURCE_SHA:0:7}"
            SYNC_BRANCH="${BRANCH_PREFIX}/${SHORT_SHA}"

            # Idempotency guard.
            # If the branch still exists, the PR is open (or wasn't cleaned up) — use it as the stack base.
            if gh api "/repos/${PEER_REPO}/git/ref/heads/${SYNC_BRANCH}" --jq '.ref' 2>/dev/null | grep -q .; then
              STACK_BASE_BRANCH="${SYNC_BRANCH}"; IS_STACK_BOTTOM="false"; continue; fi
            # If a PR was previously created, check its state.
            EXISTING_PR_STATE=$(gh pr list --repo "${PEER_REPO}" --head "${SYNC_BRANCH}" --state all \
              --json state --jq '[.[] | select(.state == "OPEN" or .state == "MERGED")] | .[0].state // empty' 2>/dev/null || true)
            if [ -n "$EXISTING_PR_STATE" ]; then
              if [ "$EXISTING_PR_STATE" = "OPEN" ]; then
                # PR is open — use its branch as the stack base.
                STACK_BASE_BRANCH="${SYNC_BRANCH}"; IS_STACK_BOTTOM="false"
              fi
              # For MERGED PRs, skip but don't update STACK_BASE_BRANCH.
              # The merged changes are already in the default branch, and
              # the sync branch has likely been deleted.
              continue
            fi

            if [ "$SOURCE_IS_PRIVATE" = "true" ]; then
              # --- Private-to-public: delta between consecutive clean snapshots. ---
              # Generate clean snapshot at SOURCE_SHA.
              SNAPSHOT_DIR="/tmp/snapshot-${SHORT_SHA}"
              mkdir -p "${SNAPSHOT_DIR}"
              git archive "${SOURCE_SHA}" | tar -x -C "${SNAPSHOT_DIR}"
              if ! python -m repo_sync.strip.cli "${SNAPSHOT_DIR}"; then
                [ -n "$SLACK_WEBHOOK_URL" ] && curl -s -X POST -H 'Content-type: application/json' \
                  --data "{\"text\":\"repo-sync: stripping failed for ${SHORT_SHA} in ${SOURCE_REPO}.\"}" \
                  "$SLACK_WEBHOOK_URL" || true
                exit 1
              fi

              # Generate clean snapshot at the parent commit.
              PREV_SHA=$(git rev-parse "${SOURCE_SHA}^")
              PREV_SNAPSHOT_DIR="/tmp/snapshot-prev-${SHORT_SHA}"
              mkdir -p "${PREV_SNAPSHOT_DIR}"
              git archive "${PREV_SHA}" | tar -x -C "${PREV_SNAPSHOT_DIR}"
              if ! python -m repo_sync.strip.cli "${PREV_SNAPSHOT_DIR}"; then
                [ -n "$SLACK_WEBHOOK_URL" ] && curl -s -X POST -H 'Content-type: application/json' \
                  --data "{\"text\":\"repo-sync: stripping failed for parent of ${SHORT_SHA} in ${SOURCE_REPO}.\"}" \
                  "$SLACK_WEBHOOK_URL" || true
                exit 1
              fi

              # Compute diff between the two clean snapshots using a temp git repo.
              DIFF_REPO="/tmp/diff-repo-${SHORT_SHA}"
              git init -q "${DIFF_REPO}"
              git -C "${DIFF_REPO}" config user.name "repo-sync-bot"
              git -C "${DIFF_REPO}" config user.email "repo-sync-bot@users.noreply.github.com"
              cp -a "${PREV_SNAPSHOT_DIR}/." "${DIFF_REPO}/"
              git -C "${DIFF_REPO}" add -A
              git -C "${DIFF_REPO}" commit -q -m "prev" --allow-empty
              git -C "${DIFF_REPO}" rm -rf --quiet . 2>/dev/null || true
              cp -a "${SNAPSHOT_DIR}/." "${DIFF_REPO}/"
              git -C "${DIFF_REPO}" add -A
              git -C "${DIFF_REPO}" commit -q -m "curr" --allow-empty

              # Check if the diff is empty (all changes were internal-only).
              if git -C "${DIFF_REPO}" diff --quiet HEAD~1 HEAD; then
                rm -rf "${SNAPSHOT_DIR}" "${PREV_SNAPSHOT_DIR}" "${DIFF_REPO}"
                continue
              fi

              # Generate the patch for the PR description agent.
              PATCH_FILE="/tmp/patch-${SHORT_SHA}.patch"
              git -C "${DIFF_REPO}" diff --binary HEAD~1 HEAD > "${PATCH_FILE}"
              DIFF_COMMIT=$(git -C "${DIFF_REPO}" rev-parse HEAD)

              # Apply the delta to the peer repo by cherry-picking from the
              # temp repo.  Cherry-pick uses three-way merge internally, so
              # it handles context mismatches from un-synced public changes
              # gracefully (unlike git apply, which requires exact context).
              pushd peer > /dev/null
              git checkout -B _sync_work "origin/${STACK_BASE_BRANCH}" 2>/dev/null \
                || git checkout -B _sync_work "${STACK_BASE_BRANCH}"
              git checkout -b "${SYNC_BRANCH}"
              git remote add diff_source "${DIFF_REPO}" 2>/dev/null || git remote set-url diff_source "${DIFF_REPO}"
              git fetch diff_source
              if ! git cherry-pick "${DIFF_COMMIT}" --allow-empty 2>/tmp/cherry-pick-err.txt; then
                # Distinguish between an empty cherry-pick (changes already
                # present in the public repo) and a real conflict.
                CONFLICTING=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
                if [ -z "$CONFLICTING" ]; then
                  # No conflicts — the delta produces no net change in the
                  # public repo (e.g., deleting files that don't exist).  Skip.
                  echo "Cherry-pick produced no changes (delta already applied). Skipping."
                  git cherry-pick --abort 2>/dev/null || true
                  popd > /dev/null
                  rm -rf "${SNAPSHOT_DIR}" "${PREV_SNAPSHOT_DIR}" "${DIFF_REPO}"
                  continue
                fi
                # Real conflict.
                git cherry-pick --abort 2>/dev/null || true
                popd > /dev/null
                echo "::error::Cherry-pick of clean delta failed for ${SOURCE_SHA}. Un-synced public changes conflict with this private commit. See docs/RUNBOOK.md."
                [ -n "$SLACK_WEBHOOK_URL" ] && curl -s -X POST -H 'Content-type: application/json' \
                  --data "{\"text\":\"repo-sync: clean delta cherry-pick failed for ${SHORT_SHA} in ${SOURCE_REPO}. See RUNBOOK.md.\"}" \
                  "$SLACK_WEBHOOK_URL" || true
                exit 1
              fi
              # Replace the cherry-picked commit message with a generic one
              # plus the Repo-Sync-Origin trailer.
              git commit --amend -m "repo-sync: sync from private" -m "Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"

              # PR description agent.
              AGENT_OUT="/tmp/agent-out-${SHORT_SHA}"; mkdir -p "$AGENT_OUT"
              PR_TITLE="repo-sync: sync from private (${SHORT_SHA})"
              PR_BODY="repo-sync: sync from private (source: \`${SHORT_SHA}\`)"
              if docker run --rm \
                -v "${SNAPSHOT_DIR}:/workspace:ro" -v "${PATCH_FILE}:/diff.patch:ro" \
                -v "$(pwd)/../.repo-sync/.agents/skills/pr-description/SKILL.md:/skill.md:ro" \
                -v "${AGENT_OUT}:/output" -w /workspace warpdotdev/repo-sync-agent:v1 \
                oz agent run --skill-file /skill.md --context-file /diff.patch --output-dir /output \
                2>/dev/null; then
                [ -f "${AGENT_OUT}/title.txt" ] && PR_TITLE=$(cat "${AGENT_OUT}/title.txt")
                [ -f "${AGENT_OUT}/body.txt" ] && PR_BODY=$(cat "${AGENT_OUT}/body.txt")
              fi
              PR_BODY=$(printf '%s\n\nRepo-Sync-Origin: %s@%s' "${PR_BODY}" "${SOURCE_REPO}" "${SOURCE_SHA}")
              git push origin "${SYNC_BRANCH}"
              gh pr create --repo "${PEER_REPO}" --head "${SYNC_BRANCH}" \
                --base "${STACK_BASE_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}"
              popd > /dev/null
              rm -rf "${SNAPSHOT_DIR}" "${PREV_SNAPSHOT_DIR}" "${DIFF_REPO}" "${PATCH_FILE}" "${AGENT_OUT}"
            else
              # --- Public-to-private: cherry-pick, Python-built description. ---
              pushd peer > /dev/null
              if ! git remote get-url source >/dev/null 2>&1; then
                git remote add source "$(cd .. && pwd)"
              fi
              git fetch source
              git checkout -B _sync_work "origin/${STACK_BASE_BRANCH}" 2>/dev/null \
                || git checkout -B _sync_work "${STACK_BASE_BRANCH}"
              git checkout -b "${SYNC_BRANCH}"
              # Cherry-pick the public commit.  If this fails, it's due to
              # private-repo divergence (rare — see docs/RUNBOOK.md).  Fail
              # loudly so the pipeline blocks and oncall is notified.
              if ! git cherry-pick "${SOURCE_SHA}" --allow-empty -x 2>/dev/null; then
                git cherry-pick --abort 2>/dev/null || true
                echo "::error::Cherry-pick failed for ${SOURCE_SHA}. See docs/RUNBOOK.md for remediation."
                [ -n "$SLACK_WEBHOOK_URL" ] && curl -s -X POST -H 'Content-type: application/json' \
                  --data "{\"text\":\"repo-sync: cherry-pick failed for ${SHORT_SHA} in ${SOURCE_REPO}. See RUNBOOK.md.\"}" \
                  "$SLACK_WEBHOOK_URL" || true
                exit 1
              fi
              # Append Repo-Sync-Origin trailer to the cherry-picked commit.
              git commit --amend -m "$(git log -1 --format='%B')" -m "Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"
              # Build description via Python.
              COMMIT_SUBJECT=$(git log -1 --format='%s' "${SOURCE_SHA}" 2>/dev/null || echo "sync")
              COMMIT_BODY_TEXT=$(git log -1 --format='%b' "${SOURCE_SHA}" 2>/dev/null || true)
              DESC_JSON=$(python -m repo_sync.workflows.cli build-description \
                --source-repo "${SOURCE_REPO}" --source-sha "${SOURCE_SHA}" \
                --commit-subject "${COMMIT_SUBJECT}" --commit-body "${COMMIT_BODY_TEXT}")
              PR_TITLE=$(echo "$DESC_JSON" | jq -r '.title')
              PR_BODY=$(echo "$DESC_JSON" | jq -r '.body')
              PR_BODY=$(printf '%s\n\nRepo-Sync-Origin: %s@%s' "${PR_BODY}" "${SOURCE_REPO}" "${SOURCE_SHA}")
              git push origin "${SYNC_BRANCH}"
              gh pr create --repo "${PEER_REPO}" --head "${SYNC_BRANCH}" \
                --base "${STACK_BASE_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}"
              popd > /dev/null
            fi
            STACK_BASE_BRANCH="${SYNC_BRANCH}"; IS_STACK_BOTTOM="false"
          done < /tmp/unsynced_commits.txt
