# Reusable workflow: sync creation.
# Triggered by a consuming repo on push to its default branch.
# Creates stacked sync PRs in the peer repo, one per unsynced commit.
#
# Private-to-public: strips private code, full tree replacement, generic commit
# message, PR description generated by an Oz agent in Docker.
#
# Public-to-private: cherry-picks commits, copies PR title/description with a
# "Synced from" header.

name: sync

on:
  workflow_call:
    inputs:
      peer_repo:
        description: "Counterpart repo (e.g. warpdotdev/warp-public)."
        required: true
        type: string
      peer_default_branch:
        description: "Default branch of the peer repo (e.g. main)."
        required: true
        type: string
      source_is_private:
        description: "If true, strip private code before syncing (private-to-public direction)."
        required: true
        type: boolean
      escalate_to:
        description: "GitHub team or user to escalate to on timeout."
        required: false
        type: string
        default: "@oncall-client-primary"
      slack_webhook_url:
        description: "Slack webhook URL for stripping error notifications."
        required: false
        type: string
        default: ""
    secrets:
      auth_token:
        description: "GitHub App installation token with cross-repo push and PR permissions."
        required: true

# Serialize sync runs per direction per repo pair.
# cancel-in-progress: false ensures at most one pending run queues behind the active one.
concurrency:
  group: repo-sync-${{ inputs.source_is_private && 'private-to-public' || 'public-to-private' }}-${{ github.repository }}-${{ inputs.peer_repo }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.auth_token }}
      PEER_REPO: ${{ inputs.peer_repo }}
      PEER_DEFAULT_BRANCH: ${{ inputs.peer_default_branch }}
      SOURCE_IS_PRIVATE: ${{ inputs.source_is_private }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can walk commits after the watermark.
          fetch-depth: 0
          token: ${{ secrets.auth_token }}

      - name: Checkout repo-sync tooling
        uses: actions/checkout@v4
        with:
          repository: warpdotdev/repo-sync
          ref: v1
          path: .repo-sync
          token: ${{ secrets.auth_token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo-sync tools
        run: pip install -e .repo-sync

      # ---------------------------------------------------------------
      # Determine sync direction label and branch prefix.
      # ---------------------------------------------------------------
      - name: Set direction variables
        id: direction
        run: |
          if [ "$SOURCE_IS_PRIVATE" = "true" ]; then
            echo "label=private-to-public" >> "$GITHUB_OUTPUT"
            echo "branch_prefix=repo-sync/private-to-public" >> "$GITHUB_OUTPUT"
          else
            echo "label=public-to-private" >> "$GITHUB_OUTPUT"
            echo "branch_prefix=repo-sync/public-to-private" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # Infinite loop check: skip commits that originated from sync.
      # A commit is sync-originated only if BOTH conditions hold:
      #   1. It has a Repo-Sync-Origin trailer.
      #   2. It was merged from a repo-sync/ branch (verified via GH API).
      # ---------------------------------------------------------------
      - name: Check if triggering commit is sync-originated
        id: loop_check
        run: |
          HEAD_SHA="${{ github.sha }}"
          TRAILER=$(git log -1 --format='%(trailers:key=Repo-Sync-Origin,valueonly)' "$HEAD_SHA" || true)

          if [ -z "$TRAILER" ]; then
            echo "is_sync=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Trailer exists -- verify the commit came from a repo-sync/ PR branch.
          # Find the PR that merged this commit.
          PR_JSON=$(gh api "/repos/${{ github.repository }}/commits/$HEAD_SHA/pulls" \
            --header "Accept: application/vnd.github+json" 2>/dev/null || echo "[]")

          SYNC_BRANCH=$(echo "$PR_JSON" | jq -r '
            .[] | select(.merged_at != null) | .head.ref
            ' | grep '^repo-sync/' | head -n1 || true)

          if [ -n "$SYNC_BRANCH" ]; then
            echo "Commit $HEAD_SHA is sync-originated (trailer + branch $SYNC_BRANCH). Skipping."
            echo "is_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "Commit $HEAD_SHA has trailer but no repo-sync/ branch. Proceeding."
            echo "is_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit early if sync-originated
        if: steps.loop_check.outputs.is_sync == 'true'
        run: echo "Skipping — this commit originated from a sync."

      # ---------------------------------------------------------------
      # Read the watermark to find the last-synced source commit.
      # The watermark tag lives in the PEER repo and points to the merge
      # commit there.  The source SHA is recovered from its
      # Repo-Sync-Origin trailer.
      # ---------------------------------------------------------------
      - name: Read watermark
        if: steps.loop_check.outputs.is_sync != 'true'
        id: watermark
        run: |
          DIRECTION="${{ steps.direction.outputs.label }}"
          WATERMARK_TAG="repo-sync/watermark/${DIRECTION}"

          # Fetch the watermark tag from the peer repo.
          WATERMARK_SHA=$(gh api "/repos/${PEER_REPO}/git/ref/tags/${WATERMARK_TAG}" \
            --jq '.object.sha' 2>/dev/null || true)

          if [ -z "$WATERMARK_SHA" ]; then
            echo "::error::No watermark tag '${WATERMARK_TAG}' found in ${PEER_REPO}. Run bootstrap first."
            exit 1
          fi

          # The watermark points to the peer's merge commit.  Recover the
          # source SHA from its Repo-Sync-Origin trailer.
          COMMIT_MSG=$(gh api "/repos/${PEER_REPO}/git/commits/${WATERMARK_SHA}" \
            --jq '.message' 2>/dev/null || true)

          # Parse the LAST Repo-Sync-Origin trailer (last occurrence wins, to
          # defeat spoofing from copied PR descriptions).
          LAST_SYNCED_SOURCE=$(echo "$COMMIT_MSG" \
            | grep '^Repo-Sync-Origin:' | tail -n1 \
            | sed 's/^Repo-Sync-Origin: *[^@]*@//')

          if [ -z "$LAST_SYNCED_SOURCE" ]; then
            echo "::error::Could not parse Repo-Sync-Origin from watermark commit ${WATERMARK_SHA}."
            exit 1
          fi

          echo "last_synced_sha=${LAST_SYNCED_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "Watermark: last synced source SHA is ${LAST_SYNCED_SOURCE}."

      # ---------------------------------------------------------------
      # Enumerate unsynced commits on the source repo's default branch.
      # ---------------------------------------------------------------
      - name: List unsynced commits
        if: steps.loop_check.outputs.is_sync != 'true'
        id: unsynced
        run: |
          LAST="${{ steps.watermark.outputs.last_synced_sha }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          # List commits after the last-synced SHA, in chronological order
          # (oldest first).  Each line is a full SHA.
          COMMITS=$(git rev-list --ancestry-path "${LAST}..${DEFAULT_BRANCH}" --reverse)

          if [ -z "$COMMITS" ]; then
            echo "No unsynced commits found."
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter out any commits that are themselves sync-originated
          # (trailer + repo-sync/ branch check).  This handles the case
          # where multiple commits landed since the last run and some are
          # sync-originated.
          FILTERED=""
          for SHA in $COMMITS; do
            TRAILER=$(git log -1 --format='%(trailers:key=Repo-Sync-Origin,valueonly)' "$SHA" || true)
            if [ -z "$TRAILER" ]; then
              FILTERED="${FILTERED}${SHA}\n"
              continue
            fi

            # Check PR branch via GitHub API.
            PR_JSON=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" \
              --header "Accept: application/vnd.github+json" 2>/dev/null || echo "[]")
            SYNC_BRANCH=$(echo "$PR_JSON" | jq -r '
              .[] | select(.merged_at != null) | .head.ref
              ' | grep '^repo-sync/' | head -n1 || true)

            if [ -n "$SYNC_BRANCH" ]; then
              echo "Skipping sync-originated commit ${SHA} (branch: ${SYNC_BRANCH})."
            else
              FILTERED="${FILTERED}${SHA}\n"
            fi
          done

          # Write to a file for the next step to consume.
          echo -e "$FILTERED" | sed '/^$/d' > /tmp/unsynced_commits.txt
          COUNT=$(wc -l < /tmp/unsynced_commits.txt | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${COUNT} unsynced commit(s)."

      - name: Exit early if no unsynced commits
        if: steps.loop_check.outputs.is_sync != 'true' && steps.unsynced.outputs.count == '0'
        run: echo "Nothing to sync."

      # ---------------------------------------------------------------
      # Checkout the peer repo so we can push branches and create PRs.
      # ---------------------------------------------------------------
      - name: Checkout peer repo
        if: steps.loop_check.outputs.is_sync != 'true' && steps.unsynced.outputs.count != '0'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.peer_repo }}
          ref: ${{ inputs.peer_default_branch }}
          path: peer
          fetch-depth: 0
          token: ${{ secrets.auth_token }}

      # ---------------------------------------------------------------
      # Create sync PRs — one per unsynced commit, stacked.
      # ---------------------------------------------------------------
      - name: Create sync PRs
        if: steps.loop_check.outputs.is_sync != 'true' && steps.unsynced.outputs.count != '0'
        env:
          DIRECTION: ${{ steps.direction.outputs.label }}
          BRANCH_PREFIX: ${{ steps.direction.outputs.branch_prefix }}
          ESCALATE_TO: ${{ inputs.escalate_to }}
          SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Track the current stack top.  Start at the peer's default branch.
          STACK_BASE="${PEER_DEFAULT_BRANCH}"
          STACK_BASE_BRANCH="${PEER_DEFAULT_BRANCH}"
          IS_STACK_BOTTOM="true"

          # If there are already open sync PRs (from a previous partial run),
          # find the top of the existing stack to continue from.
          EXISTING_TOP=$(gh pr list \
            --repo "${PEER_REPO}" \
            --head "${BRANCH_PREFIX}/" \
            --state open \
            --json headRefName,number \
            --jq 'sort_by(.number) | last | .headRefName // empty' 2>/dev/null || true)

          if [ -n "$EXISTING_TOP" ]; then
            STACK_BASE_BRANCH="$EXISTING_TOP"
            IS_STACK_BOTTOM="false"
            echo "Continuing from existing stack top: ${EXISTING_TOP}."
          fi

          COMMIT_INDEX=0
          while IFS= read -r SOURCE_SHA; do
            [ -z "$SOURCE_SHA" ] && continue
            COMMIT_INDEX=$((COMMIT_INDEX + 1))
            SHORT_SHA="${SOURCE_SHA:0:7}"
            SYNC_BRANCH="${BRANCH_PREFIX}/${SHORT_SHA}"

            echo "--- Processing commit ${COMMIT_INDEX}: ${SOURCE_SHA} ---"

            # Idempotency guard: skip if a branch or PR already exists for
            # this commit.
            EXISTING_BRANCH=$(gh api "/repos/${PEER_REPO}/git/ref/heads/${SYNC_BRANCH}" \
              --jq '.ref' 2>/dev/null || true)
            if [ -n "$EXISTING_BRANCH" ]; then
              echo "Branch ${SYNC_BRANCH} already exists. Skipping."
              STACK_BASE_BRANCH="${SYNC_BRANCH}"
              IS_STACK_BOTTOM="false"
              continue
            fi

            EXISTING_PR=$(gh pr list \
              --repo "${PEER_REPO}" \
              --head "${SYNC_BRANCH}" \
              --state all \
              --json number \
              --jq '.[0].number // empty' 2>/dev/null || true)
            if [ -n "$EXISTING_PR" ]; then
              echo "PR already exists for ${SYNC_BRANCH} (#${EXISTING_PR}). Skipping."
              STACK_BASE_BRANCH="${SYNC_BRANCH}"
              IS_STACK_BOTTOM="false"
              continue
            fi

            # ===========================================================
            # Private-to-public: strip, full tree replacement, agent PR
            # description.
            # ===========================================================
            if [ "$SOURCE_IS_PRIVATE" = "true" ]; then
              echo "Generating clean snapshot at ${SOURCE_SHA}..."

              # Invoke the stripping tool.
              # Expected interface: python -m repo_sync.strip <commit-sha> <output-dir>
              # Reads from the current git repo, writes the clean snapshot to <output-dir>.
              SNAPSHOT_DIR="/tmp/snapshot-${SHORT_SHA}"
              if ! python -m repo_sync.strip "${SOURCE_SHA}" "${SNAPSHOT_DIR}"; then
                echo "::error::Stripping tool failed for commit ${SOURCE_SHA}."
                # Send Slack notification if webhook is configured.
                if [ -n "$SLACK_WEBHOOK_URL" ]; then
                  curl -s -X POST -H 'Content-type: application/json' \
                    --data "{\"text\":\"repo-sync: stripping failed for commit ${SHORT_SHA} in ${SOURCE_REPO}. Sync is blocked until this is fixed.\"}" \
                    "$SLACK_WEBHOOK_URL" || true
                fi
                # Fail the workflow — do NOT advance the watermark.
                exit 1
              fi

              # Diff the clean snapshot against the peer repo's current state
              # at the stack base.  If the diff is empty, all changes in this
              # commit were internal-only.
              pushd peer > /dev/null
              git checkout -B _sync_work "origin/${STACK_BASE_BRANCH}" 2>/dev/null \
                || git checkout -B _sync_work "${STACK_BASE_BRANCH}"

              # Full tree replacement: remove everything, copy the snapshot in.
              git rm -rf --quiet . 2>/dev/null || true
              cp -a "${SNAPSHOT_DIR}/." .
              git add -A

              if git diff --cached --quiet; then
                echo "Empty diff for ${SOURCE_SHA}. Skipping (internal-only changes)."
                popd > /dev/null
                rm -rf "${SNAPSHOT_DIR}"
                continue
              fi

              # Create the sync branch and commit.
              git checkout -b "${SYNC_BRANCH}"
              git commit -m "repo-sync: sync from private

Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"

              # Generate PR description using the Oz agent in Docker.
              # The agent runs inside a container with only the clean snapshot
              # and the public diff — no access to private history.
              git diff "origin/${STACK_BASE_BRANCH}" HEAD -- > /tmp/public-diff-${SHORT_SHA}.patch

              PR_TITLE="repo-sync: sync from private (${SHORT_SHA})"
              PR_BODY=""

              # Attempt agent-generated description.  Fall back to generic on failure.
              AGENT_OUTPUT_DIR="/tmp/agent-output-${SHORT_SHA}"
              mkdir -p "$AGENT_OUTPUT_DIR"

              # Expected: Docker image warpdotdev/repo-sync-agent:v1 with oz CLI installed.
              # The skill file and diff are mounted read-only.
              if docker run --rm \
                -v "${SNAPSHOT_DIR}:/workspace:ro" \
                -v "/tmp/public-diff-${SHORT_SHA}.patch:/diff.patch:ro" \
                -v "$(pwd)/../.repo-sync/.agents/skills/pr-description/SKILL.md:/skill.md:ro" \
                -v "${AGENT_OUTPUT_DIR}:/output" \
                -w /workspace \
                warpdotdev/repo-sync-agent:v1 \
                oz agent run \
                  --skill-file /skill.md \
                  --context-file /diff.patch \
                  --output-dir /output \
                2>/dev/null; then
                # Read agent output.  Expected files: /output/title.txt, /output/body.txt.
                if [ -f "${AGENT_OUTPUT_DIR}/title.txt" ]; then
                  PR_TITLE=$(cat "${AGENT_OUTPUT_DIR}/title.txt")
                fi
                if [ -f "${AGENT_OUTPUT_DIR}/body.txt" ]; then
                  PR_BODY=$(cat "${AGENT_OUTPUT_DIR}/body.txt")
                fi
              else
                echo "PR description agent failed. Using fallback description."
                PR_BODY="repo-sync: sync from private (source: \`${SHORT_SHA}\`)"
              fi

              # Append the Repo-Sync-Origin trailer (deterministic, always present).
              PR_BODY="${PR_BODY}

Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"

              # Push branch and create PR.
              git push origin "${SYNC_BRANCH}"
              PR_URL=$(gh pr create \
                --repo "${PEER_REPO}" \
                --head "${SYNC_BRANCH}" \
                --base "${STACK_BASE_BRANCH}" \
                --title "${PR_TITLE}" \
                --body "${PR_BODY}")

              echo "Created PR: ${PR_URL}"

              # Enable auto-merge only on the stack bottom.
              if [ "$IS_STACK_BOTTOM" = "true" ]; then
                PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
                gh pr merge "${PR_NUMBER}" \
                  --repo "${PEER_REPO}" \
                  --auto \
                  --squash || echo "Warning: could not enable auto-merge."
              fi

              popd > /dev/null
              rm -rf "${SNAPSHOT_DIR}" "/tmp/public-diff-${SHORT_SHA}.patch" "${AGENT_OUTPUT_DIR}"

            # ===========================================================
            # Public-to-private: cherry-pick, copy PR title/description.
            # ===========================================================
            else
              echo "Cherry-picking ${SOURCE_SHA} into peer repo..."

              pushd peer > /dev/null
              git checkout -B _sync_work "origin/${STACK_BASE_BRANCH}" 2>/dev/null \
                || git checkout -B _sync_work "${STACK_BASE_BRANCH}"

              # Create the sync branch.
              git checkout -b "${SYNC_BRANCH}"

              # Cherry-pick preserving author.
              CHERRY_PICK_FAILED="false"
              if ! git cherry-pick "${SOURCE_SHA}" --allow-empty -x 2>/dev/null; then
                echo "Cherry-pick conflict for ${SOURCE_SHA}. Attempting agent resolution..."
                CHERRY_PICK_FAILED="true"

                # Invoke the conflict resolution agent.
                # Expected interface: oz agent run --skill warpdotdev/repo-sync:conflict-resolution
                # The agent resolves conflicts, commits, and pushes.
                CONFLICTING_FILES=$(git diff --name-only --diff-filter=U)

                if oz agent run \
                  --skill warpdotdev/repo-sync:conflict-resolution \
                  --context "Conflicting files: ${CONFLICTING_FILES}" \
                  2>/dev/null; then
                  echo "Agent resolved conflicts successfully."
                else
                  echo "Agent failed to resolve conflicts. Creating PR for human review."
                  # Abort the cherry-pick and create an empty commit noting the conflict.
                  git cherry-pick --abort 2>/dev/null || true
                  git commit --allow-empty -m "repo-sync: cherry-pick conflict for ${SOURCE_SHA} — needs manual resolution

Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"
                fi
              fi

              # Amend the commit to include the Repo-Sync-Origin trailer if
              # the cherry-pick succeeded cleanly.
              if [ "$CHERRY_PICK_FAILED" = "false" ]; then
                EXISTING_MSG=$(git log -1 --format='%B')
                git commit --amend -m "${EXISTING_MSG}
Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"
              fi

              # Build PR title and body from the source PR (or commit message).
              SOURCE_PR_JSON=$(gh api "/repos/${SOURCE_REPO}/commits/${SOURCE_SHA}/pulls" \
                --header "Accept: application/vnd.github+json" 2>/dev/null || echo "[]")

              SOURCE_PR_TITLE=$(echo "$SOURCE_PR_JSON" | jq -r '
                [.[] | select(.merged_at != null)] | first | .title // empty')
              SOURCE_PR_BODY=$(echo "$SOURCE_PR_JSON" | jq -r '
                [.[] | select(.merged_at != null)] | first | .body // empty')
              SOURCE_PR_URL=$(echo "$SOURCE_PR_JSON" | jq -r '
                [.[] | select(.merged_at != null)] | first | .html_url // empty')
              SOURCE_REPO_NAME=$(echo "$SOURCE_REPO" | cut -d'/' -f2)

              if [ -n "$SOURCE_PR_TITLE" ]; then
                PR_TITLE="$SOURCE_PR_TITLE"
                PR_BODY="Synced from ${SOURCE_REPO_NAME}: ${SOURCE_PR_URL}

${SOURCE_PR_BODY}"
              else
                # Direct push (no source PR).  Use commit message.
                COMMIT_MSG=$(git log -1 --format='%s' "${SOURCE_SHA}" 2>/dev/null \
                  || echo "repo-sync: sync from public (${SHORT_SHA})")
                COMMIT_BODY=$(git log -1 --format='%b' "${SOURCE_SHA}" 2>/dev/null || true)
                COMMIT_URL="https://github.com/${SOURCE_REPO}/commit/${SOURCE_SHA}"

                PR_TITLE="$COMMIT_MSG"
                PR_BODY="Synced from ${SOURCE_REPO_NAME}: ${COMMIT_URL}

${COMMIT_BODY}"
              fi

              # Append the Repo-Sync-Origin trailer.
              PR_BODY="${PR_BODY}

Repo-Sync-Origin: ${SOURCE_REPO}@${SOURCE_SHA}"

              # Push and create PR.
              git push origin "${SYNC_BRANCH}"
              PR_URL=$(gh pr create \
                --repo "${PEER_REPO}" \
                --head "${SYNC_BRANCH}" \
                --base "${STACK_BASE_BRANCH}" \
                --title "${PR_TITLE}" \
                --body "${PR_BODY}")

              echo "Created PR: ${PR_URL}"

              # Request reviewer if there was a conflict (agent-resolved or not).
              if [ "$CHERRY_PICK_FAILED" = "true" ]; then
                PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

                # Determine who to assign: merger of source PR, or commit author.
                REVIEWER=$(echo "$SOURCE_PR_JSON" | jq -r '
                  [.[] | select(.merged_at != null)] | first | .merged_by.login // empty')
                if [ -z "$REVIEWER" ]; then
                  REVIEWER=$(gh api "/repos/${SOURCE_REPO}/commits/${SOURCE_SHA}" \
                    --jq '.author.login // empty' 2>/dev/null || true)
                fi
                if [ -z "$REVIEWER" ]; then
                  REVIEWER="${ESCALATE_TO}"
                fi

                gh pr edit "${PR_NUMBER}" \
                  --repo "${PEER_REPO}" \
                  --add-reviewer "${REVIEWER}" 2>/dev/null || true

                # Append Repo-Sync-Assigned trailer for escalation tracking.
                TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                CURRENT_BODY=$(gh pr view "${PR_NUMBER}" --repo "${PEER_REPO}" --json body --jq '.body')
                gh pr edit "${PR_NUMBER}" \
                  --repo "${PEER_REPO}" \
                  --body "${CURRENT_BODY}
Repo-Sync-Assigned: ${REVIEWER}@${TIMESTAMP}"
              fi

              # Enable auto-merge only on the stack bottom, and only if no conflicts.
              if [ "$IS_STACK_BOTTOM" = "true" ] && [ "$CHERRY_PICK_FAILED" = "false" ]; then
                PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
                gh pr merge "${PR_NUMBER}" \
                  --repo "${PEER_REPO}" \
                  --auto \
                  --squash || echo "Warning: could not enable auto-merge."
              fi

              popd > /dev/null
            fi

            # Advance the stack pointer.
            STACK_BASE_BRANCH="${SYNC_BRANCH}"
            IS_STACK_BOTTOM="false"
          done < /tmp/unsynced_commits.txt
