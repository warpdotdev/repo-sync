# Reusable workflow: restack after sync PR merge.
# Triggered by a consuming repo on pull_request closed+merged for repo-sync/
# branches, or via workflow_dispatch for stuck stack recovery.
#
# Implements: watermark update, rebase --onto for squash merge compatibility,
# auto-merge enable on new stack bottom, CI failure -> human assignment,
# conflict -> agent invocation with mandatory human sign-off.

name: restack

on:
  workflow_call:
    inputs:
      public_repo:
        description: "Public repo (e.g. warpdotdev/warp-public)."
        required: true
        type: string
      private_repo:
        description: "Private repo (e.g. warpdotdev/warp-internal)."
        required: true
        type: string
      escalate_to:
        description: "GitHub team or user to escalate to on timeout."
        required: false
        type: string
        default: "@oncall-client-primary"
      app_id:
        description: "GitHub App ID."
        required: true
        type: string
      repo_sync_ref:
        description: "Ref of the repo-sync repo to use."
        required: false
        type: string
        default: "main"
    secrets:
      app_private_key:
        description: "GitHub App private key."
        required: true
  # workflow_dispatch is used for stuck-stack recovery.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Stuck PR number to restack."
        required: true
        type: string
      public_repo:
        description: "Public repo (e.g. warpdotdev/warp-public)."
        required: true
        type: string
      private_repo:
        description: "Private repo (e.g. warpdotdev/warp-internal)."
        required: true
        type: string
      escalate_to:
        description: "GitHub team or user to escalate to on timeout."
        required: false
        type: string
        default: "@oncall-client-primary"

# Serialize ALL restack operations to prevent concurrent rebases.
concurrency:
  group: repo-sync-restack-${{ github.repository }}
  cancel-in-progress: false

jobs:
  restack:
    runs-on: ubuntu-latest
    # Run if: (a) the PR was merged (normal restack), (b) dispatched for
    # stuck stack recovery, or (c) labeled with repo-sync:needs-restack
    # (triggered by the approve workflow for auto-retargeted PRs).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'repo-sync/')) ||
      (github.event.action == 'labeled' &&
       github.event.label.name == 'repo-sync:needs-restack' &&
       startsWith(github.event.pull_request.head.ref, 'repo-sync/'))
    permissions:
      contents: write
      pull-requests: write
    env:
      PUBLIC_REPO: ${{ inputs.public_repo }}
      PRIVATE_REPO: ${{ inputs.private_repo }}
      ESCALATE_TO: ${{ inputs.escalate_to }}
    steps:
      # Generate a token for both workflow_call and workflow_dispatch.
      # For workflow_call, secrets are passed from the caller.
      # For workflow_dispatch, secrets come from the repo's own secrets.
      - name: Generate installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key || secrets.REPO_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Set GH_TOKEN
        run: echo "GH_TOKEN=${{ steps.token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Checkout repo-sync tooling
        uses: actions/checkout@v4
        with:
          repository: warpdotdev/repo-sync
          ref: ${{ inputs.repo_sync_ref }}
          path: .repo-sync
          token: ${{ steps.token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo-sync tools
        run: pip install -e .repo-sync

      - name: Configure git identity
        run: |
          git config --global user.name "warp-repo-sync[bot]"
          git config --global user.email "270220925+warp-repo-sync[bot]@users.noreply.github.com"

      # Derive peer_repo and source_is_private from the two repo names.
      - name: Derive sync context
        id: context
        run: |
          if [ "${{ github.repository }}" = "${PRIVATE_REPO}" ]; then
            echo "source_is_private=true" >> "$GITHUB_OUTPUT"
            echo "peer_repo=${PUBLIC_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "source_is_private=false" >> "$GITHUB_OUTPUT"
            echo "peer_repo=${PRIVATE_REPO}" >> "$GITHUB_OUTPUT"
          fi

      # Identify the PR context FIRST so we can use the stuck PR's head
      # branch for direction detection (avoids the fallback inversion bug).
      - name: Identify PR context
        id: merged_pr
        run: |
          # Stuck-stack recovery or needs-restack: the PR is open and needs
          # rebasing, NOT a merged PR.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.action }}" = "labeled" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              STUCK_PR="${{ github.event.inputs.pr_number || '' }}"
            else
              STUCK_PR="${{ github.event.pull_request.number }}"
            fi
            if [ -z "$STUCK_PR" ]; then
              echo "::error::No PR number provided."
              exit 1
            fi
            echo "mode=stuck_recovery" >> "$GITHUB_OUTPUT"
            echo "stuck_pr=${STUCK_PR}" >> "$GITHUB_OUTPUT"
            STUCK_HEAD=$(gh pr view "$STUCK_PR" --json headRefName --jq '.headRefName')
            STUCK_BASE=$(gh pr view "$STUCK_PR" --json baseRefName --jq '.baseRefName')
            echo "stuck_head_branch=${STUCK_HEAD}" >> "$GITHUB_OUTPUT"
            echo "stuck_base_branch=${STUCK_BASE}" >> "$GITHUB_OUTPUT"
            echo "Needs-restack PR #${STUCK_PR}: head=${STUCK_HEAD}, base=${STUCK_BASE}."
            exit 0
          fi

          # Normal path: a sync PR was just merged.
          MERGED_PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "mode=normal" >> "$GITHUB_OUTPUT"
          echo "pr_number=${MERGED_PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # Get the merge commit SHA.
          MERGE_SHA=$(gh pr view "$MERGED_PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid')
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"

          # Get the head branch and its tip commit SHA.  We need the tip SHA
          # because the branch may have been auto-deleted after merge, making
          # origin/<branch> unresolvable during rebase --onto.
          HEAD_BRANCH=$(gh pr view "$MERGED_PR_NUMBER" --json headRefName --jq '.headRefName')
          HEAD_SHA=$(gh pr view "$MERGED_PR_NUMBER" --json headRefOid --jq '.headRefOid')
          echo "merged_head_branch=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "merged_head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Merged PR #${MERGED_PR_NUMBER}: merge SHA ${MERGE_SHA}, head ${HEAD_BRANCH} (${HEAD_SHA})."

      # Direction detection AFTER PR identification, so we can use the stuck
      # PR's head branch for direction detection instead of the fallback.
      - name: Set direction variables
        id: direction
        run: |
          # Use the stuck PR's head branch (if available) or the merged PR's head branch.
          if [ "${{ steps.merged_pr.outputs.mode }}" = "stuck_recovery" ]; then
            HEAD_BRANCH="${{ steps.merged_pr.outputs.stuck_head_branch }}"
          else
            HEAD_BRANCH="${{ github.event.pull_request.head.ref || '' }}"
          fi
          PRIVATE_FLAG=""
          [ "${{ steps.context.outputs.source_is_private }}" = "true" ] && PRIVATE_FLAG="--source-is-private"
          python -m repo_sync.workflows.cli detect-direction \
            --head-branch "${HEAD_BRANCH}" \
            $PRIVATE_FLAG
          # Watermark lives in THIS repo (the target).
          echo "watermark_repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"

      # All restack logic (watermark update, find next PR, rebase, push,
      # label management) is in Python for testability.
      - name: Run restack
        run: |
          MODE="${{ steps.merged_pr.outputs.mode }}"
          python -m repo_sync.workflows.cli restack-pr \
            --mode "${MODE}" \
            --direction "${{ steps.direction.outputs.direction }}" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            --watermark-repo "${{ steps.direction.outputs.watermark_repo }}" \
            --repo-dir . \
            --gh-repo "${{ github.repository }}" \
            --merge-sha "${{ steps.merged_pr.outputs.merge_sha }}" \
            --merged-head-branch "${{ steps.merged_pr.outputs.merged_head_branch }}" \
            --stuck-pr-number "${{ steps.merged_pr.outputs.stuck_pr || '0' }}" \
            --stuck-head-branch "${{ steps.merged_pr.outputs.stuck_head_branch }}"
